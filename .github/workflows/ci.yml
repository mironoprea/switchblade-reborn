name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            python: "3.11"
          - os: windows-latest
            python: "3.13"
          - os: ubuntu-latest
            python: "3.13"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - run: python -m pip install -e ".[dev]"
      - run: python -m pytest -q
      - run: python -m app.cli validate
      - run: python -m ruff check app tests tools

  package:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - run: python -m pip install -e ".[dev,build]"
      - run: .\scripts\build.ps1 -SkipInstaller
      - uses: actions/upload-artifact@v4
        with:
          name: SwitchbladeReborn-portable
          path: dist/SwitchbladeReborn/
